{% set name = "pefile" %}
{% set version = "2024.8.26" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/erocarrera/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 116ec29b689ea4f0ede7327ebbd794ce8977e5eaa97565393441d3404deecda3

build:
  number: 0
  skip: true  # [py<36]
  script: {{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python

# E FileNotFoundError: [Errno 2] No such file or directory: 'tests/test_files/MSVBVM60.DLL'
{% set ignore_tests = "--ignore=tests/pefile_test.py" %}

test:
  source_files:
    - tests
  imports:
    - pefile
    - peutils
    - ordlookup
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest tests {{ ignore_tests }}

about:
  home: https://github.com/erocarrera/pefile
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: pefile is a Python module to read and work with PE (Portable Executable) files
  description: |
    pefile is a Python module to read and work with PE (Portable Executable) files.
    The structures defined in the Windows header files will be accessible as attributes
    in the PE instance. The naming of fields/attributes will try to adhere to the naming
    scheme in those headers. Only shortcuts added for convenience will depart from that convention.
  dev_url: https://github.com/erocarrera/pefile
  doc_url: https://github.com/erocarrera/pefile/blob/master/README.md

extra:
  recipe-maintainers:
    - nicoddemus
